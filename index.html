 margin:0;

/* LOGIN */
#loginPage{
 width:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.login-box{
 background:#0d7015;
 padding:30px;
 border-radius:10px;
 text-align:center;
}

input{
 padding:10px;
 width:200px;

 border-radius:5px;
}

/* SIDEBAR */
.sidebar{
 width:250px;
 background:#ffffff;
 padding:15px;
 overflow-y:auto;
}


/* SIDEBAR MOBILE (GESER) */
.sidebar{
  width:250px;
  background:#ffffff;
  padding:15px;
  overflow-y:auto;

  position:fixed;
  left:0;
  top:0;
  height:100%;
  z-index:1000;

  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

/* SAAT MUNCUL */
.sidebar.active{
  transform: translateX(0);
}

/* TOMBOL TOGGLE */
.toggle-btn{
  position:fixed;
  top:80px;
  left:10px;
  background:#203bb6;
  color:white;
  padding:10px;
  border-radius:5px;
  z-index:1100;
  cursor:pointer;
}


.nomor{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
}

.nomor div{
 background:#334155;
 padding:10px;
 text-align:center;
 border-radius:5px;
 cursor:pointer;
}

/* MAIN */
.main{
 flex:1;
 display:flex;
 flex-direction:column;
}

.header{
 background:#203bb6;
 padding:10px 20px;
 display:flex;
 justify-content:space-between;
}

.soal-box{
 flex:1;
 padding:20px;
}

.card{
 background:#fdfffe;
 padding:20px;
 border-radius:10px;
}

.pilihan label{
  display:flex;
  align-items:center;
  justify-content:flex-start;

  gap:8px;                 /* diperkecil biar tidak jauh */
  padding:10px 12px;

  background:#ffffff;
  margin:8px 0;
  border-radius:5px;
  cursor:pointer;

  white-space:nowrap;      /* PENTING: cegah turun */
}

.pilihan input[type="radio"]{
  margin:0;
  transform: scale(0.9);   /* kecilkan sedikit */
  flex-shrink:0;
}

/* TEKS PILIHAN */
.pilihan label{
  text-align:left;
}

.footer{
 padding:10px;
 text-align:right;
}

button{
 background:#ffffff;
 border:none;
 padding:10px 20px;
 color:rgb(0, 0, 0);
 border-radius:5px;
 cursor:pointer;
}

.card img{
  max-width: 200px;
  height: auto;
  display: block;
  margin: 10px auto;
}





/* TEKS SOAL JADI HITAM */
.card {
  color: #111; /* hitam gelap */
}

/* TEKS PERTANYAAN */
.card p {
  color: #111;
}

/* TEKS PILIHAN JAWABAN */
.pilihan label {
  color: #111;
  font-weight: 500; /* biar lebih jelas */
}

/* RADIO BUTTON (opsional biar kontras) */
.pilihan input[type="radio"] {
  accent-color: #111;
}

















/* GARIS TEPI KOTAK SOAL */
.card{
  border: 3px solid #022c22; /* hijau gelap elegan */
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* GARIS TEPI PILIHAN JAWABAN */
.pilihan label{
  border: 2px solid #bfae00; /* kuning lebih gelap */
  transition: all 0.2s ease;
}

/* EFEK SAAT DISOROT (HOVER) */
.pilihan label:hover{
  border: 2px solid #111;
  background: #ffe94d;
}

/* SAAT DIPILIH */
.pilihan input[type="radio"]:checked + span,
.pilihan label:has(input:checked){
  border: 2px solid #16a34a;
  background: #bbf7d0;
  color: #000;
}

  background: #2563eb; /* biru elegan */

// LOGIN
function login(){
 let u = document.getElementById("username").value;
 let p = document.getElementById("password").value;

 fetch(WEB_APP_URL,{
   method:"POST",
   body: JSON.stringify({
     action:"login",
     username:u,
     password:p
   })
 })
 .then(res=>res.json())
 .then(res=>{
   if(res.status=="sukses"){
     userLogin = {username:u,nama:res.nama};

     document.getElementById("loginPage").style.display="none";
     document.getElementById("app").style.display="flex";

     document.getElementById("namaUser").innerText = res.nama;

     loadNomor();
     tampilSoal(0);
     mulaiTimer();
   }else{
     alert("Login gagal!");
   }
 });
}

// BUAT NOMOR
function loadNomor(){
 const nomorBox = document.getElementById("nomorSoal");
 nomorBox.innerHTML = "";

 soal.forEach((s,i)=>{
   let div = document.createElement("div");
   div.innerText = i+1;
   div.onclick = ()=>tampilSoal(i);
   nomorBox.appendChild(div);
 });
}

   let huruf = String.fromCharCode(65+idx);

   html += `
   <label>
   <input type="radio" name="jawab"
   ${jawaban[i]==huruf?"checked":""}
   onclick="pilih('${huruf}')">
   ${huruf}. ${o}
   </label>`;
 });

 html += "</div>";

 document.getElementById("soal").innerHTML = html;

 updateNomor();
}

// PILIH JAWABAN
function pilih(h){
 jawaban[index] = h;
 updateNomor();
}

// UPDATE NOMOR
function updateNomor(){
 let semua = document.querySelectorAll(".nomor div");

 semua.forEach((el,i)=>{
   if(jawaban[i]!=""){
     el.style.background="#22c55e";
   }else{
     el.style.background="#334155";
   }

   if(i==index){
     el.style.border="2px solid yellow";
   }else{
     el.style.border="none";
   }
 });
}





function hitungNilai(){
 let benar = 0;
 let total = soal.length;

 for(let i=0;i<total;i++){
   if(jawaban[i] !== "" && jawaban[i] === kunci[i]){
     benar++;
   }
 }

 let nilai = (benar / total) * 100;
 return Math.round(nilai);
}





// KIRIM JAWABAN
function kirim(){

 let kosong = jawaban.filter(j => j=="").length;

 if(kosong > 0){
   let lanjut = confirm("Masih ada "+kosong+" soal belum dijawab. Tetap kirim?");
   if(!lanjut) return;
 }

 fetch(WEB_APP_URL,{
   method:"POST",
   body: JSON.stringify({
     action:"kirim",
     nama:userLogin.nama,
     username:userLogin.username,
     jawaban:jawaban
   })
 })
 .then(res=>res.text())
 .then(()=>{
   alert("Ujian selesai!");
   location.reload();
 });
}




let waktu = 90 * 60; // 90 menit dalam detik
let intervalTimer;

// FORMAT WAKTU
function formatWaktu(detik){
  let m = Math.floor(detik / 60);
  let s = detik % 60;
  return `${m}:${s < 10 ? "0"+s : s}`;
}

// JALANKAN TIMER
function mulaiTimer(){
  intervalTimer = setInterval(()=>{
    waktu--;

    document.getElementById("timer").innerText = formatWaktu(waktu);
    if(waktu <= 600){
  document.getElementById("timer").style.color = "red";
}

    if(waktu <= 0){
      clearInterval(intervalTimer);
      alert("Waktu habis! Jawaban akan dikirim.");
      kirim();
    }

  },1000);
}



const sidebar = document.querySelector(".sidebar");

// TOMBOL KLIK
function toggleSidebar(){
  sidebar.classList.toggle("active");
}

// SWIPE (HP SUPPORT)
let startX = 0;
let endX = 0;

// DETEKSI SENTUH
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe(){
  let diff = endX - startX;

  // Geser kanan → buka
  if(diff > 50){
    sidebar.classList.add("active");
  }

  // Geser kiri → tutup
  if(diff < -50){
    sidebar.classList.remove("active");
  }
}




</script>
